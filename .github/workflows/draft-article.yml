name: 記事自動生成・公開

on:
  schedule:
    - cron: '0 0 * * 1'   # 毎週月曜 00:00 UTC = 09:00 JST
  workflow_dispatch:        # GitHub の Actions タブから手動実行も可

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: RSS取得・記事生成
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-draft.mjs

      - name: main へ直接コミット・プッシュ
        if: steps.generate.outputs.branch != ''
        run: |
          git config user.email "action@github.com"
          git config user.name "kokueki-os bot"
          git add src/data/articles.ts
          git commit -m "feat: ${{ steps.generate.outputs.title }}"
          git push origin main

      - name: 新着なし（スキップ）
        if: steps.generate.outputs.branch == ''
        run: echo "新着記事候補がないか、適切なトピックがありませんでした。"
