name: 記事ドラフト自動生成

on:
  schedule:
    - cron: '0 0 * * 1'   # 毎週月曜 00:00 UTC = 09:00 JST
  workflow_dispatch:        # GitHub の Actions タブから手動実行も可

permissions:
  contents: write
  pull-requests: write

jobs:
  draft:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: RSS取得・記事ドラフト生成
        id: draft
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-draft.mjs

      - name: ブランチ作成・コミット・プッシュ
        if: steps.draft.outputs.branch != ''
        run: |
          git config user.email "action@github.com"
          git config user.name "kokueki-os bot"
          git checkout -b "${{ steps.draft.outputs.branch }}"
          git add src/data/articles.ts
          git commit -m "draft: ${{ steps.draft.outputs.title }}"
          git push origin "${{ steps.draft.outputs.branch }}"

      - name: Draft PR を作成
        if: steps.draft.outputs.branch != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "[ドラフト] ${{ steps.draft.outputs.title }}" \
            --body-file .draft-pr-body.md \
            --head "${{ steps.draft.outputs.branch }}" \
            --base main \
            --draft

      - name: 新着なし（スキップ）
        if: steps.draft.outputs.branch == ''
        run: echo "新着記事候補がないか、適切なトピックがありませんでした。"
